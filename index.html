<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Blog-Preview-Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <section class="card">
        <section class="img-card">
            <img src="assets/illustration-article.svg" alt="illustration">
        </section>
        
        <!-- This is the text section-->
        <section class="text-section">
            <h3 class="learning">Learning</h3>
            <p class="publication">Published 31 March 2026</p>
            <h2 class="heading">HTML & CSS foundations</h2>
            <p class="info">These languages are the backbone of every website, defining structure, content, and presentation.</p>
        </section>
        
        <!-- This section contains the authors information-->
        <section class="author-info">
            <img src="assets/userpic.svg" alt="author image">
            <h3 class="name">Greg Hopper</h3>
        </section>
    </section>
</body>
</html>
